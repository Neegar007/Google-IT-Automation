# LogSentry Agent Configuration File
# Copy this file and modify according to your needs

[api]
# Platform API endpoint to send logs to
endpoint = http://localhost:8080/api/logs
# API key for authentication (optional)
api_key = 

[agent]
# Log level for the agent itself (DEBUG, INFO, WARNING, ERROR)
log_level = INFO
# Number of logs to batch before sending
batch_size = 10
# How often to flush logs (in seconds)
flush_interval = 5

[logs]
# Comma-separated list of log file paths to watch
# Example: /var/log/syslog,/var/log/messages,/home/user/myapp.log
paths = ./logfiles.log,Bash/Project/syslog.log
